<script>
  /******************************************************************
   * CONFIG CENTRAL
   ******************************************************************/
  const CONFIG = {
    defaultWorkerUrl: localStorage.getItem("snap_worker_url") || "",
    storageKeyDeadlines: "snap_tracker_deadlines_v2",
    storageKeyWorkerUrl: "snap_worker_url",

    actionListarPublicacoes: "listarPublicacoes",
    actionDetalharPublicacao: "detalharPublicacao",

    usarEndpointDetalhe: false
  };

  const state = {
    rawItems: [],
    filteredItems: [],
    selectedItem: null,
    deadlines: loadDeadlines(),
    loading: false
  };

  const $ = (id) => document.getElementById(id);

  const els = {
    desde: $("desde"),
    ate: $("ate"),
    limit: $("limit"),
    comTexto: $("comTexto"),
    buscaLivre: $("buscaLivre"),
    somenteComPrazo: $("somenteComPrazo"),
    workerUrl: $("workerUrl"),
    btnBuscar: $("btnBuscar"),
    btnHoje: $("btnHoje"),
    btn7dias: $("btn7dias"),
    btn30dias: $("btn30dias"),
    btnLimpar: $("btnLimpar"),
    btnExportarJson: $("btnExportarJson"),
    btnApagarPrazos: $("btnApagarPrazos"),
    resultsBody: $("resultsBody"),
    emptyState: $("emptyState"),
    detailsBox: $("detailsBox"),
    connStatus: $("connStatus"),
    resultsCount: $("resultsCount"),
    savedDeadlinesCount: $("savedDeadlinesCount"),
    lastFetch: $("lastFetch"),
    globalMessage: $("globalMessage")
  };

  init();

  function init() {
    els.workerUrl.value = CONFIG.defaultWorkerUrl;
    presetLast7Days();
    updateDashboard();

    els.btnBuscar.addEventListener("click", handleBuscar);
    els.btnHoje.addEventListener("click", presetToday);
    els.btn7dias.addEventListener("click", presetLast7Days);
    els.btn30dias.addEventListener("click", presetLast30Days);
    els.btnLimpar.addEventListener("click", clearFilters);
    els.btnExportarJson.addEventListener("click", exportJson);
    els.btnApagarPrazos.addEventListener("click", clearAllDeadlines);

    els.buscaLivre.addEventListener("input", applyLocalFiltersAndRender);
    els.somenteComPrazo.addEventListener("change", applyLocalFiltersAndRender);
    els.workerUrl.addEventListener("change", persistWorkerUrl);
  }

  function persistWorkerUrl() {
    localStorage.setItem(CONFIG.storageKeyWorkerUrl, els.workerUrl.value.trim());
  }

  function loadDeadlines() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG.storageKeyDeadlines) || "{}");
    } catch {
      return {};
    }
  }

  function saveDeadlines() {
    localStorage.setItem(CONFIG.storageKeyDeadlines, JSON.stringify(state.deadlines));
    updateDashboard();
  }

  function updateDashboard() {
    els.resultsCount.textContent = String(state.filteredItems.length || 0);
    els.savedDeadlinesCount.textContent = String(Object.keys(state.deadlines).length);
    els.connStatus.textContent = state.loading
      ? "Consultando..."
      : (state.rawItems.length ? "Conectado" : "Aguardando");
  }

  function setMessage(msg) {
    els.globalMessage.textContent = msg;
  }

  function setLoading(on) {
    state.loading = on;
    els.btnBuscar.disabled = on;
    els.btnBuscar.innerHTML = on
      ? '<span class="loader"></span> Consultando...'
      : 'Buscar publicações';
    updateDashboard();
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function shiftDate(baseStr, deltaDays) {
    const d = new Date(baseStr + "T12:00:00");
    d.setDate(d.getDate() + deltaDays);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function presetToday() {
    const t = todayStr();
    els.desde.value = t;
    els.ate.value = t;
  }

  function presetLast7Days() {
    const t = todayStr();
    els.ate.value = t;
    els.desde.value = shiftDate(t, -7);
  }

  function presetLast30Days() {
    const t = todayStr();
    els.ate.value = t;
    els.desde.value = shiftDate(t, -30);
  }

  function clearFilters() {
    presetLast7Days();
    els.limit.value = "50";
    els.comTexto.value = "true";
    els.buscaLivre.value = "";
    els.somenteComPrazo.value = "todos";
    renderRows([]);
    state.rawItems = [];
    state.filteredItems = [];
    state.selectedItem = null;
    renderDetails(null);
    updateDashboard();
    setMessage("Filtros limpos.");
  }

  async function handleBuscar() {
    const workerUrl = els.workerUrl.value.trim();
    if (!workerUrl) {
      setMessage("Informe o endpoint do Worker.");
      els.workerUrl.focus();
      return;
    }

    persistWorkerUrl();

    const payload = {
      snapAction: CONFIG.actionListarPublicacoes,
      desde: els.desde.value || undefined,
      ate: els.ate.value || undefined,
      limit: Number(els.limit.value || 50),
      comTexto: els.comTexto.value === "true",

      /**************************************************************
       * Flags extras para o Worker, caso ele suporte trazer dados
       * enriquecidos do processo.
       **************************************************************/
      comProcesso: true,
      comPartes: true,
      comVara: true,
      comTribunal: true,
      comOrgaoJulgador: true,
      comMetadados: true
    };

    setLoading(true);
    setMessage("Consultando publicações via Worker...");
    renderRows([]);

    try {
      const res = await fetch(workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await safeJson(res);

      if (!res.ok) {
        throw new Error(data?.message || data?.error || `Erro HTTP ${res.status}`);
      }

      const items = normalizeItems(data);
      state.rawItems = items;
      state.selectedItem = null;
      renderDetails(null);
      applyLocalFiltersAndRender();

      els.lastFetch.textContent = new Date().toLocaleTimeString("pt-BR", {
        hour: "2-digit",
        minute: "2-digit"
      });

      setMessage(`${items.length} publicação(ões) carregada(s).`);
    } catch (err) {
      console.error(err);
      state.rawItems = [];
      state.filteredItems = [];
      renderRows([]);
      renderDetails(null);
      setMessage(`Falha na consulta: ${err.message || err}`);
    } finally {
      setLoading(false);
    }
  }

  async function safeJson(res) {
    try {
      return await res.json();
    } catch {
      return {};
    }
  }

  /******************************************************************
   * NORMALIZAÇÃO ROBUSTA
   ******************************************************************/
  function normalizeItems(data) {
    const arr =
      data?.items ||
      data?.publicacoes ||
      data?.data?.items ||
      data?.data?.publicacoes ||
      data?.data ||
      data?.result?.items ||
      data?.result?.publicacoes ||
      data?.result ||
      [];

    if (!Array.isArray(arr)) return [];

    return arr.map((item, index) => {
      const id = String(
        pickFirst(item, [
          "idPublicacao",
          "id",
          "codigo",
          "sequencial",
          "hash"
        ]) ?? `idx_${index}`
      );

      const dataPub = pickFirst(item, [
        "dataPublicacao",
        "dataDisponibilizacao",
        "data",
        "publicadoEm",
        "dtPublicacao",
        "edicao.data",
        "edicao.dataPublicacao"
      ]);

      const diario = firstNonEmpty([
        pickFirst(item, ["diario", "jornal", "edicao.nome", "nomeDiario", "caderno"]),
        joinNonEmpty([
          pickFirst(item, ["tribunal", "siglaTribunal"]),
          pickFirst(item, ["origem", "ramoJustica"])
        ], " • ")
      ]);

      const tribunal = firstNonEmpty([
        pickFirst(item, [
          "tribunal",
          "siglaTribunal",
          "dadosProcesso.tribunal",
          "processo.tribunal",
          "origem"
        ]),
        ""
      ]);

      const processo = normalizeNumeroProcesso(item);
      const vara = normalizeVara(item);
      const orgaoJulgador = normalizeOrgaoJulgador(item);
      const classe = normalizeClasse(item);
      const assunto = normalizeAssunto(item);
      const partes = normalizePartes(item);
      const advogados = normalizeAdvogados(item);

      const texto = firstNonEmpty([
        pickFirst(item, [
          "texto",
          "conteudo",
          "integra",
          "textoIntegral",
          "textoPublicacao",
          "publicacaoTexto",
          "resumo",
          "descricao"
        ]),
        ""
      ]);

      return {
        _raw: item,
        id,
        dataPublicacao: normalizeDateString(dataPub),
        diario: diario || "—",
        tribunal: tribunal || "—",
        processo: processo || "—",
        vara: vara || "—",
        orgaoJulgador: orgaoJulgador || "—",
        classe: classe || "—",
        assunto: assunto || "—",
        partes: partes || "—",
        advogados: advogados || "—",
        texto: texto || "—",
        prazoFinal: state.deadlines[id] || ""
      };
    });
  }

  function normalizeNumeroProcesso(item) {
    const direct = pickFirst(item, [
      "numeroProcesso",
      "numProcesso",
      "processo",
      "cnj",
      "processoNumero",
      "dadosProcesso.numero",
      "dadosProcesso.numeroProcesso",
      "processo.numero",
      "processo.numeroProcesso"
    ]);

    if (typeof direct === "string" && direct.trim()) {
      return direct.trim();
    }

    if (typeof direct === "number") {
      return String(direct);
    }

    if (direct && typeof direct === "object") {
      return firstNonEmpty([
        direct.numero,
        direct.numeroProcesso,
        direct.cnj
      ]);
    }

    return "";
  }

  function normalizeVara(item) {
    return firstNonEmpty([
      pickFirst(item, [
        "vara",
        "unidade",
        "juizo",
        "dadosProcesso.vara",
        "dadosProcesso.unidade",
        "processo.vara",
        "processo.unidade"
      ]),
      joinNonEmpty([
        pickFirst(item, ["comarca"]),
        pickFirst(item, ["foro"])
      ], " • ")
    ]);
  }

  function normalizeOrgaoJulgador(item) {
    return firstNonEmpty([
      pickFirst(item, [
        "orgaoJulgador",
        "orgao",
        "secretaria",
        "gabinete",
        "dadosProcesso.orgaoJulgador",
        "processo.orgaoJulgador"
      ]),
      ""
    ]);
  }

  function normalizeClasse(item) {
    return firstNonEmpty([
      pickFirst(item, [
        "classe",
        "classeProcessual",
        "dadosProcesso.classe",
        "processo.classe"
      ]),
      ""
    ]);
  }

  function normalizeAssunto(item) {
    const assuntoDireto = pickFirst(item, [
      "assunto",
      "assuntos",
      "dadosProcesso.assunto",
      "dadosProcesso.assuntos",
      "processo.assunto",
      "processo.assuntos"
    ]);

    if (Array.isArray(assuntoDireto)) {
      return assuntoDireto.map(v => stringifyValue(v)).filter(Boolean).join(" • ");
    }

    return stringifyValue(assuntoDireto);
  }

  function normalizePartes(item) {
    const partesDiretas = pickFirst(item, [
      "partes",
      "nomePartes",
      "dadosProcesso.partes",
      "processo.partes"
    ]);

    if (Array.isArray(partesDiretas)) {
      return partesDiretas.map(formatParte).filter(Boolean).join(" • ");
    }

    if (partesDiretas && typeof partesDiretas === "object") {
      const vals = Object.values(partesDiretas).flatMap(v => {
        if (Array.isArray(v)) return v.map(formatParte);
        return [formatParte(v)];
      }).filter(Boolean);

      if (vals.length) return vals.join(" • ");
    }

    const polos = [];

    const poloAtivo = pickFirst(item, [
      "poloAtivo",
      "dadosProcesso.poloAtivo",
      "processo.poloAtivo"
    ]);

    const poloPassivo = pickFirst(item, [
      "poloPassivo",
      "dadosProcesso.poloPassivo",
      "processo.poloPassivo"
    ]);

    if (poloAtivo) polos.push(`Ativo: ${normalizePeopleList(poloAtivo)}`);
    if (poloPassivo) polos.push(`Passivo: ${normalizePeopleList(poloPassivo)}`);

    const avulsas = [
      pickFirst(item, ["autor", "autora", "requerente", "exequente", "impetrante"]),
      pickFirst(item, ["reu", "réu", "requerido", "executado", "impetrado"])
    ].filter(Boolean);

    if (avulsas.length) {
      return [...polos, ...avulsas.map(normalizePeopleList)].filter(Boolean).join(" • ");
    }

    if (polos.length) return polos.join(" • ");

    return firstNonEmpty([
      stringifyValue(pickFirst(item, [
        "autor",
        "autora",
        "reu",
        "réu",
        "requerente",
        "requerido"
      ])),
      ""
    ]);
  }

  function normalizeAdvogados(item) {
    const candidatos = [
      pickFirst(item, ["advogados", "dadosProcesso.advogados", "processo.advogados"]),
      pickFirst(item, ["procuradores"]),
      pickFirst(item, ["representantes"])
    ].filter(Boolean);

    const out = [];

    candidatos.forEach(c => {
      if (Array.isArray(c)) {
        c.forEach(v => {
          const s = formatParte(v);
          if (s) out.push(s);
        });
      } else if (typeof c === "object") {
        Object.values(c).forEach(v => {
          if (Array.isArray(v)) {
            v.forEach(x => {
              const s = formatParte(x);
              if (s) out.push(s);
            });
          } else {
            const s = formatParte(v);
            if (s) out.push(s);
          }
        });
      } else {
        const s = stringifyValue(c);
        if (s) out.push(s);
      }
    });

    return [...new Set(out)].join(" • ");
  }

  function normalizePeopleList(value) {
    if (!value) return "";

    if (Array.isArray(value)) {
      return value.map(formatParte).filter(Boolean).join(" • ");
    }

    if (typeof value === "object") {
      return Object.values(value).map(formatParte).filter(Boolean).join(" • ");
    }

    return stringifyValue(value);
  }

  function formatParte(v) {
    if (!v) return "";

    if (typeof v === "string" || typeof v === "number") {
      return String(v).trim();
    }

    if (typeof v === "object") {
      const nome = firstNonEmpty([
        v.nome,
        v.nomeCompleto,
        v.parte,
        v.razaoSocial,
        v.denominacao
      ]);

      const tipo = firstNonEmpty([
        v.tipo,
        v.polo,
        v.qualidade,
        v.posicao
      ]);

      const oab = firstNonEmpty([
        v.oab,
        v.numeroOab
      ]);

      const base = nome || stringifyValue(v);
      const sufixo = joinNonEmpty([
        tipo,
        oab ? `OAB ${oab}` : ""
      ], " • ");

      return sufixo ? `${base} (${sufixo})` : base;
    }

    return "";
  }

  function pickFirst(obj, paths) {
    for (const path of paths) {
      const val = deepGet(obj, path);
      if (isMeaningful(val)) return val;
    }
    return "";
  }

  function deepGet(obj, path) {
    if (!obj || !path) return undefined;
    const keys = String(path).split(".");
    let cur = obj;

    for (const key of keys) {
      if (cur == null) return undefined;
      cur = cur[key];
    }

    return cur;
  }

  function isMeaningful(v) {
    if (v == null) return false;
    if (typeof v === "string") return v.trim() !== "";
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === "object") return Object.keys(v).length > 0;
    return true;
  }

  function stringifyValue(v) {
    if (v == null) return "";
    if (typeof v === "string") return v.trim();
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    if (Array.isArray(v)) return v.map(stringifyValue).filter(Boolean).join(" • ");
    if (typeof v === "object") {
      return firstNonEmpty([
        v.nome,
        v.descricao,
        v.texto,
        v.valor,
        ""
      ]);
    }
    return "";
  }

  function firstNonEmpty(arr) {
    for (const v of arr) {
      const s = stringifyValue(v);
      if (s) return s;
    }
    return "";
  }

  function joinNonEmpty(arr, sep = " ") {
    return arr.map(stringifyValue).filter(Boolean).join(sep);
  }

  function normalizeDateString(v) {
    if (!v) return "";
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;

    if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) {
      const [d, m, y] = v.split("/");
      return `${y}-${m}-${d}`;
    }

    const date = new Date(v);
    if (Number.isNaN(date.getTime())) return String(v);

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDateBR(v) {
    if (!v) return "—";
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
      const [y, m, d] = v.split("-");
      return `${d}/${m}/${y}`;
    }
    return v;
  }

  function applyLocalFiltersAndRender() {
    const q = (els.buscaLivre.value || "").trim().toLowerCase();
    const mode = els.somenteComPrazo.value;

    let items = [...state.rawItems];

    if (q) {
      items = items.filter(item => {
        const blob = [
          item.id,
          item.dataPublicacao,
          item.diario,
          item.tribunal,
          item.processo,
          item.vara,
          item.orgaoJulgador,
          item.classe,
          item.assunto,
          item.partes,
          item.advogados,
          item.texto,
          JSON.stringify(item._raw || {})
        ].join(" ").toLowerCase();

        return blob.includes(q);
      });
    }

    if (mode === "comPrazo") {
      items = items.filter(item => !!state.deadlines[item.id]);
    } else if (mode === "semPrazo") {
      items = items.filter(item => !state.deadlines[item.id]);
    }

    state.filteredItems = items;
    renderRows(items);
    updateDashboard();
  }

  function renderRows(items) {
    els.resultsBody.innerHTML = "";

    if (!items.length) {
      els.emptyState.style.display = "block";
      return;
    }

    els.emptyState.style.display = "none";

    const frag = document.createDocumentFragment();

    items.forEach(item => {
      const tr = document.createElement("tr");

      const prazo = state.deadlines[item.id] || "";
      const badgeClass = prazo ? "ok" : "warn";
      const badgeText = prazo ? "Prazo lançado" : "Sem prazo";

      const diarioTribunal = joinNonEmpty([
        item.diario !== "—" ? item.diario : "",
        item.tribunal !== "—" ? item.tribunal : ""
      ], "<br>");

      const processoVara = joinNonEmpty([
        item.processo !== "—" ? item.processo : "",
        item.vara !== "—" ? item.vara : "",
        item.orgaoJulgador !== "—" ? item.orgaoJulgador : ""
      ], "<br>");

      tr.innerHTML = `
        <td>
          <div class="cell-title">${formatDateBR(item.dataPublicacao)}</div>
          <div class="cell-sub mono">ID ${escapeHtml(item.id)}</div>
        </td>

        <td>
          <div class="cell-title">${escapeHtml(item.diario || "—")}</div>
          <div class="cell-sub">${escapeHtml(item.tribunal || "—")}</div>
        </td>

        <td>
          <div class="cell-title mono">${escapeHtml(item.processo || "—")}</div>
          <div class="cell-sub">${escapeHtml(
            [item.vara, item.orgaoJulgador].filter(v => v && v !== "—").join(" • ") || "—"
          )}</div>
        </td>

        <td>
          <div class="cell-title">${escapeHtml(truncate(item.partes || "—", 180))}</div>
          <div class="cell-sub">${escapeHtml(
            [item.classe, item.assunto].filter(v => v && v !== "—").join(" • ") || ""
          )}</div>
        </td>

        <td>
          <div class="text-preview">${escapeHtml(truncate(item.texto || "—", 330))}</div>
        </td>

        <td>
          <div style="display:grid; gap:8px;">
            <span class="badge ${badgeClass}">${badgeText}</span>
            <input type="date" data-deadline-id="${escapeHtml(item.id)}" value="${escapeHtmlAttr(prazo)}">
          </div>
        </td>

        <td>
          <div class="row-actions">
            <button class="btn-secondary small-btn" data-detail-id="${escapeHtml(item.id)}">Ver detalhes</button>
            <button class="btn-ghost small-btn" data-copy-id="${escapeHtml(item.id)}">Copiar texto</button>
          </div>
        </td>
      `;

      frag.appendChild(tr);
    });

    els.resultsBody.appendChild(frag);

    els.resultsBody.querySelectorAll("[data-deadline-id]").forEach(input => {
      input.addEventListener("change", (e) => {
        const id = e.target.getAttribute("data-deadline-id");
        const value = e.target.value || "";

        if (value) state.deadlines[id] = value;
        else delete state.deadlines[id];

        saveDeadlines();

        state.rawItems = state.rawItems.map(i => i.id === id ? { ...i, prazoFinal: value } : i);
        applyLocalFiltersAndRender();

        setMessage(value
          ? `Prazo salvo para a publicação ${id}.`
          : `Prazo removido da publicação ${id}.`);
      });
    });

    els.resultsBody.querySelectorAll("[data-detail-id]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = e.target.getAttribute("data-detail-id");
        const item = state.rawItems.find(x => x.id === id);
        if (!item) return;

        if (!CONFIG.usarEndpointDetalhe) {
          state.selectedItem = item;
          renderDetails(item);
          return;
        }

        await fetchAndRenderDetail(id, item);
      });
    });

    els.resultsBody.querySelectorAll("[data-copy-id]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = e.target.getAttribute("data-copy-id");
        const item = state.rawItems.find(x => x.id === id);
        if (!item) return;

        const text = [
          `ID: ${item.id}`,
          `Data: ${formatDateBR(item.dataPublicacao)}`,
          `Diário: ${item.diario || "—"}`,
          `Tribunal: ${item.tribunal || "—"}`,
          `Processo: ${item.processo || "—"}`,
          `Vara: ${item.vara || "—"}`,
          `Órgão julgador: ${item.orgaoJulgador || "—"}`,
          `Classe: ${item.classe || "—"}`,
          `Assunto: ${item.assunto || "—"}`,
          `Partes: ${item.partes || "—"}`,
          `Advogados: ${item.advogados || "—"}`,
          `Prazo final: ${state.deadlines[item.id] || "—"}`,
          "",
          item.texto || ""
        ].join("\n");

        try {
          await navigator.clipboard.writeText(text);
          setMessage(`Texto da publicação ${id} copiado.`);
        } catch {
          setMessage("Não foi possível copiar para a área de transferência.");
        }
      });
    });
  }

  async function fetchAndRenderDetail(id, currentItem) {
    const workerUrl = els.workerUrl.value.trim();
    if (!workerUrl) return;

    setMessage(`Buscando detalhes da publicação ${id}...`);

    try {
      const res = await fetch(workerUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          snapAction: CONFIG.actionDetalharPublicacao,
          idPublicacao: id,
          comTexto: true,
          comEdicao: true,
          comProcesso: true,
          comPartes: true,
          comVara: true,
          comTribunal: true,
          comOrgaoJulgador: true,
          comMetadados: true
        })
      });

      const data = await safeJson(res);
      if (!res.ok) {
        throw new Error(data?.message || data?.error || `Erro HTTP ${res.status}`);
      }

      const detail = normalizeItems({
        items: [data?.item || data?.publicacao || data]
      })[0] || currentItem;

      state.selectedItem = detail;
      renderDetails(detail);
      setMessage(`Detalhes da publicação ${id} carregados.`);
    } catch (err) {
      console.error(err);
      state.selectedItem = currentItem;
      renderDetails(currentItem);
      setMessage(`Falha ao detalhar a publicação ${id}. Exibindo dados já carregados.`);
    }
  }

  function renderDetails(item) {
    if (!item) {
      els.detailsBox.innerHTML = `<div class="details-empty">Nenhuma publicação selecionada.</div>`;
      return;
    }

    const prazo = state.deadlines[item.id] || "—";

    els.detailsBox.innerHTML = `
      <div class="kv">
        <div class="key">ID</div>
        <div class="val mono">${escapeHtml(item.id)}</div>
      </div>
      <div class="kv">
        <div class="key">Data da publicação</div>
        <div class="val">${escapeHtml(formatDateBR(item.dataPublicacao))}</div>
      </div>
      <div class="kv">
        <div class="key">Diário</div>
        <div class="val">${escapeHtml(item.diario || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Tribunal</div>
        <div class="val">${escapeHtml(item.tribunal || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Processo</div>
        <div class="val mono">${escapeHtml(item.processo || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Vara / Unidade</div>
        <div class="val">${escapeHtml(item.vara || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Órgão julgador</div>
        <div class="val">${escapeHtml(item.orgaoJulgador || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Classe</div>
        <div class="val">${escapeHtml(item.classe || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Assunto</div>
        <div class="val">${escapeHtml(item.assunto || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Partes</div>
        <div class="val">${escapeHtml(item.partes || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Advogados</div>
        <div class="val">${escapeHtml(item.advogados || "—")}</div>
      </div>
      <div class="kv">
        <div class="key">Prazo final</div>
        <div class="val">${escapeHtml(formatDateBR(prazo))}</div>
      </div>
      <div class="kv">
        <div class="key">Texto</div>
        <div class="val" style="white-space:pre-wrap;">${escapeHtml(item.texto || "—")}</div>
      </div>
    `;
  }

  function exportJson() {
    const payload = {
      exportedAt: new Date().toISOString(),
      total: state.filteredItems.length,
      itens: state.filteredItems.map(item => ({
        id: item.id,
        dataPublicacao: item.dataPublicacao,
        diario: item.diario,
        tribunal: item.tribunal,
        processo: item.processo,
        vara: item.vara,
        orgaoJulgador: item.orgaoJulgador,
        classe: item.classe,
        assunto: item.assunto,
        partes: item.partes,
        advogados: item.advogados,
        texto: item.texto,
        prazoFinal: state.deadlines[item.id] || "",
        raw: item._raw || {}
      }))
    };

    const blob = new Blob(
      [JSON.stringify(payload, null, 2)],
      { type: "application/json;charset=utf-8" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "publicacoes-snap.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    setMessage("Exportação concluída.");
  }

  function clearAllDeadlines() {
    if (!confirm("Deseja apagar todos os prazos salvos neste navegador?")) return;
    state.deadlines = {};
    saveDeadlines();
    applyLocalFiltersAndRender();
    renderDetails(state.selectedItem);
    setMessage("Todos os prazos foram apagados.");
  }

  function truncate(text, max) {
    const s = String(text || "");
    return s.length > max ? s.slice(0, max).trimEnd() + "…" : s;
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function escapeHtmlAttr(str) {
    return escapeHtml(str).replaceAll("`", "&#96;");
  }
</script>
