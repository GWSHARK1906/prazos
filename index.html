<script>
  (function () {
    "use strict";

    window.addEventListener("error", function (event) {
      var box = document.getElementById("fatalError");
      if (!box) return;
      box.style.display = "block";
      box.textContent = "Erro no JavaScript do index: " + (event.message || "falha desconhecida");
    });

    var CONFIG = {
      defaultWorkerUrl: localStorage.getItem("snap_worker_url") || "",
      storageKeyDeadlines: "snap_tracker_deadlines_v2",
      storageKeyWorkerUrl: "snap_worker_url",
      actionListarPublicacoes: "listarPublicacoes",
      actionDetalharPublicacao: "detalharPublicacao",
      usarEndpointDetalhe: false
    };

    var state = {
      rawItems: [],
      filteredItems: [],
      selectedItem: null,
      deadlines: loadDeadlines(),
      loading: false
    };

    function $(id) {
      return document.getElementById(id);
    }

    var els = {
      desde: $("desde"),
      ate: $("ate"),
      limit: $("limit"),
      comTexto: $("comTexto"),
      buscaLivre: $("buscaLivre"),
      somenteComPrazo: $("somenteComPrazo"),
      workerUrl: $("workerUrl"),
      btnBuscar: $("btnBuscar"),
      btnHoje: $("btnHoje"),
      btn7dias: $("btn7dias"),
      btn30dias: $("btn30dias"),
      btnLimpar: $("btnLimpar"),
      btnExportarJson: $("btnExportarJson"),
      btnApagarPrazos: $("btnApagarPrazos"),
      resultsBody: $("resultsBody"),
      emptyState: $("emptyState"),
      detailsBox: $("detailsBox"),
      connStatus: $("connStatus"),
      resultsCount: $("resultsCount"),
      savedDeadlinesCount: $("savedDeadlinesCount"),
      lastFetch: $("lastFetch"),
      globalMessage: $("globalMessage"),
      detailsModal: $("detailsModal"),
      detailsModalContent: $("detailsModalContent"),
      btnFecharModal: $("btnFecharModal")
    };

    init();

    function init() {
      els.workerUrl.value = CONFIG.defaultWorkerUrl;
      presetLast7Days();
      applyDateMask(els.desde);
      applyDateMask(els.ate);
      updateDashboard();

      els.btnBuscar.addEventListener("click", handleBuscar);
      els.btnHoje.addEventListener("click", presetToday);
      els.btn7dias.addEventListener("click", presetLast7Days);
      els.btn30dias.addEventListener("click", presetLast30Days);
      els.btnLimpar.addEventListener("click", clearFilters);
      els.btnExportarJson.addEventListener("click", exportJson);
      els.btnApagarPrazos.addEventListener("click", clearAllDeadlines);

      els.buscaLivre.addEventListener("input", applyLocalFiltersAndRender);
      els.somenteComPrazo.addEventListener("change", applyLocalFiltersAndRender);
      els.workerUrl.addEventListener("change", persistWorkerUrl);

      els.btnFecharModal.addEventListener("click", closeDetailsModal);
      els.detailsModal.addEventListener("click", function (e) {
        if (e.target === els.detailsModal) closeDetailsModal();
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && els.detailsModal.classList.contains("show")) {
          closeDetailsModal();
        }
      });

      // Novo listener para botão "Criar Prazo"
      document.addEventListener("click", function (e) {
        var btnCriar = e.target.closest("#btnCriarPrazoPublicacao");
        if (btnCriar) {
          toggleManualDeadlineForm(true);
          return;
        }

        var btnFecharManual = e.target.closest("#btnFecharPrazoManual");
        if (btnFecharManual) {
          toggleManualDeadlineForm(false);
        }

        var btnSalvarPrazo = e.target.closest("#btnSalvarPrazoManual");
        if (btnSalvarPrazo) {
          salvarPrazoManual();
        }
      });
    }

    function persistWorkerUrl() {
      localStorage.setItem(CONFIG.storageKeyWorkerUrl, (els.workerUrl.value || "").trim());
    }

    function loadDeadlines() {
      try {
        return JSON.parse(localStorage.getItem(CONFIG.storageKeyDeadlines) || "{}");
      } catch (e) {
        return {};
      }
    }

    function saveDeadlines() {
      localStorage.setItem(CONFIG.storageKeyDeadlines, JSON.stringify(state.deadlines));
      updateDashboard();
    }

    function updateDashboard() {
      els.resultsCount.textContent = String(state.filteredItems.length || 0);
      els.savedDeadlinesCount.textContent = String(Object.keys(state.deadlines).length);
      els.connStatus.textContent = state.loading
        ? "Consultando..."
        : (state.rawItems.length ? "Conectado" : "Aguardando");
    }

    function setMessage(msg) {
      els.globalMessage.textContent = msg;
    }

    function setLoading(on) {
      state.loading = on;
      els.btnBuscar.disabled = on;
      els.btnBuscar.innerHTML = on
        ? '<span class="loader"></span> Consultando...'
        : "Buscar publicações";
      updateDashboard();
    }

    function todayStr() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return day + "/" + m + "/" + y;
    }

    function shiftDate(baseStr, deltaDays) {
      var iso = brToIso(baseStr);
      var d = new Date(iso + "T12:00:00");
      d.setDate(d.getDate() + deltaDays);

      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return day + "/" + m + "/" + y;
    }

    function presetToday() {
      var t = todayStr();
      els.desde.value = t;
      els.ate.value = t;
    }

    function presetLast7Days() {
      var t = todayStr();
      els.ate.value = t;
      els.desde.value = shiftDate(t, -7);
    }

    function presetLast30Days() {
      var t = todayStr();
      els.ate.value = t;
      els.desde.value = shiftDate(t, -30);
    }

    function clearFilters() {
      presetLast7Days();
      els.limit.value = "50";
      els.comTexto.value = "true";
      els.buscaLivre.value = "";
      els.somenteComPrazo.value = "todos";
      renderRows([]);
      state.rawItems = [];
      state.filteredItems = [];
      state.selectedItem = null;
      closeDetailsModal();
      updateDashboard();
      setMessage("Filtros limpos.");
    }

    async function handleBuscar() {
      var workerUrl = (els.workerUrl.value || "").trim();

      if (!workerUrl) {
        setMessage("Informe o endpoint do Worker.");
        els.workerUrl.focus();
        return;
      }

      persistWorkerUrl();

      var desdeIso = brToIso((els.desde.value || "").trim());
      var ateIso = brToIso((els.ate.value || "").trim());

      var payload = {
        snapAction: CONFIG.actionListarPublicacoes,
        desde: desdeIso || undefined,
        ate: ateIso || undefined,
        limit: Number(els.limit.value || 50),
        comTexto: els.comTexto.value === "true",
        comProcesso: true,
        comPartes: true,
        comVara: true,
        comTribunal: true,
        comOrgaoJulgador: true,
        comMetadados: true
      };

      setLoading(true);
      setMessage("Consultando publicações via Worker...");
      renderRows([]);

      try {
        var res = await fetch(workerUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        var data = await safeJson(res);

        if (!res.ok) {
          throw new Error(data && (data.message || data.error) || ("Erro HTTP " + res.status));
        }

        var items = normalizeItems(data);
        state.rawItems = items;
        state.selectedItem = null;
        closeDetailsModal();
        applyLocalFiltersAndRender();

        els.lastFetch.textContent = new Date().toLocaleTimeString("pt-BR", {
          hour: "2-digit",
          minute: "2-digit"
        });

        setMessage(items.length + " publicação(ões) carregada(s).");
      } catch (err) {
        console.error(err);
        state.rawItems = [];
        state.filteredItems = [];
        renderRows([]);
        closeDetailsModal();
        setMessage("Falha na consulta: " + (err.message || err));
      } finally {
        setLoading(false);
      }
    }

    async function safeJson(res) {
      try {
        return await res.json();
      } catch (e) {
        return {};
      }
    }

    function normalizeItems(data) {
      var arr =
        data && (
          data.items ||
          data.publicacoes ||
          (data.data && (data.data.items || data.data.publicacoes || data.data)) ||
          (data.result && (data.result.items || data.result.publicacoes || data.result)) ||
          []
        );

      if (!Array.isArray(arr)) return [];

      return arr.map(function (item, index) {
        var id = String(item.id || item.idPublicacao || item.codigo || ("idx_" + index));

        var dataPublicacao  = normalizeDateString(item.dataPublicacao || "");
        var tribunal        = item.tribunal  || "—";
        var processo        = item.numeroProcesso || "—";
        var vara            = item.vara       || "";
        var classe          = item.classe     || "";
        var tipoAto         = item.tipoAto    || "";
        var partes          = item.partes     || "";
        var advogados       = item.advogados  || "";
        var texto           = item.textoResumo || item.texto || "—"; // Prioriza textoResumo do worker
        var semEfeito       = item.semEfeitoIntimacao === true;
        var formato         = item.formato    || "A";

        var diario = tribunal;

        return {
          _raw: item,
          id: id,
          formato: formato,
          semEfeitoIntimacao: semEfeito,
          dataPublicacao: dataPublicacao,
          diario: diario,
          tribunal: tribunal,
          processo: processo,
          vara: vara,
          classe: classe,
          tipoAto: tipoAto,
          partes: partes,
          advogados: advogados,
          texto: texto,
          prazoFinal: state.deadlines[id] || ""
        };
      });
    }

    function normalizeDateString(v) {
      if (!v) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) {
        var p = v.split("/");
        return p[2] + "-" + p[1] + "-" + p[0];
      }

      var date = new Date(v);
      if (Number.isNaN(date.getTime())) return String(v);

      var y = date.getFullYear();
      var m = String(date.getMonth() + 1).padStart(2, "0");
      var d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function formatDateBR(v) {
      if (!v) return "—";
      if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
        var p = v.split("-");
        return p[2] + "/" + p[1] + "/" + p[0];
      }
      return v;
    }

    function brToIso(v) {
      if (!v) return "";
      var s = String(v).trim();

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
        var p = s.split("/");
        return p[2] + "-" + p[1] + "-" + p[0];
      }

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        return s;
      }

      return "";
    }

    function applyDateMask(input) {
      if (!input) return;

      input.addEventListener("input", function (e) {
        var v = e.target.value.replace(/\D/g, "").slice(0, 8);

        if (v.length >= 5) {
          e.target.value = v.slice(0, 2) + "/" + v.slice(2, 4) + "/" + v.slice(4);
        } else if (v.length >= 3) {
          e.target.value = v.slice(0, 2) + "/" + v.slice(2);
        } else {
          e.target.value = v;
        }
      });

      input.addEventListener("blur", function (e) {
        var s = e.target.value.trim();
        if (!s) return;

        if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
          return;
        }

        var iso = brToIso(s);
        if (iso) {
          e.target.value = formatDateBR(iso);
        }
      });
    }

    function applyLocalFiltersAndRender() {
      var q = (els.buscaLivre.value || "").trim().toLowerCase();
      var mode = els.somenteComPrazo.value;
      var items = state.rawItems.slice();

      if (q) {
        items = items.filter(function (item) {
          var blob = [
            item.id,
            item.dataPublicacao,
            item.tribunal,
            item.processo,
            item.vara,
            item.classe,
            item.tipoAto,
            item.partes,
            item.advogados,
            item.texto,
            JSON.stringify(item._raw || {})
          ].join(" ").toLowerCase();

          return blob.indexOf(q) >= 0;
        });
      }

      if (mode === "comPrazo") {
        items = items.filter(function (item) { return !!state.deadlines[item.id]; });
      } else if (mode === "semPrazo") {
        items = items.filter(function (item) { return !state.deadlines[item.id]; });
      }

      state.filteredItems = items;
      renderRows(items);
      updateDashboard();
    }

    function renderRows(items) {
      els.resultsBody.innerHTML = "";

      if (!items.length) {
        els.emptyState.style.display = "block";
        return;
      }

      els.emptyState.style.display = "none";

      var frag = document.createDocumentFragment();

      items.forEach(function (item) {
        var tr = document.createElement("tr");

        if (item.semEfeitoIntimacao) {
          tr.classList.add("sem-efeito");
        }

        var prazo = state.deadlines[item.id] || "";
        var badgeClass = prazo ? "ok" : "warn";
        var badgeText  = prazo ? "Prazo lançado" : "Sem prazo";

        var tipoAtoBadge = "";
        if (item.semEfeitoIntimacao) {
          tipoAtoBadge = '<span class="badge muted" style="margin-top:4px;">Sem efeito</span>';
        } else if (item.tipoAto && item.tipoAto !== "Outro") {
          var tipoClass = item.tipoAto === "Intimação" ? "info" :
                          item.tipoAto === "Despacho"  ? "warn" :
                          item.tipoAto === "Decisão"   ? "danger" : "";
          if (tipoClass) {
            tipoAtoBadge = '<span class="badge ' + tipoClass + '" style="margin-top:4px;">' + escapeHtml(item.tipoAto) + '</span>';
          }
        }

        var varaTexto = item.vara || "";
        var classeTexto = item.classe || "";
        var partesTexto = item.partes || "—";

        tr.innerHTML = ''
          + '<td>'
          + '  <div class="cell-title">' + escapeHtml(formatDateBR(item.dataPublicacao)) + '</div>'
          + '  <div class="cell-sub mono">ID ' + escapeHtml(item.id) + '</div>'
          + '</td>'
          + '<td>'
          + '  <div class="cell-title">' + escapeHtml(item.tribunal || "—") + '</div>'
          + '</td>'
          + '<td>'
          + '  <div class="cell-title mono">' + escapeHtml(item.processo || "—") + '</div>'
          + '  <div class="cell-sub">' + escapeHtml(varaTexto) + '</div>'
          + (classeTexto ? '  <div class="cell-sub" style="margin-top:4px;">' + escapeHtml(classeTexto) + '</div>' : '')
          + '</td>'
          + '<td>'
          + '  <div class="cell-title">' + escapeHtml(truncate(partesTexto, 180)) + '</div>'
          + (item.advogados ? '  <div class="cell-sub" style="margin-top:4px;">' + escapeHtml(truncate(item.advogados, 120)) + '</div>' : '')
          + '</td>'
          + '<td>'
          + '  <div class="text-preview">' + escapeHtml(truncate(item.textoResumo || item.texto || "—", 330)) + '</div>'
          + '</td>'
          + '<td>'
          + '  <div style="display:grid; gap:6px;">'
          + '    <span class="badge ' + badgeClass + '">' + badgeText + '</span>'
          + tipoAtoBadge
          + '    <input type="date" data-deadline-id="' + escapeHtmlAttr(item.id) + '" value="' + escapeHtmlAttr(prazo) + '">'
          + '  </div>'
          + '</td>'
          + '<td>'
          + '  <div class="row-actions">'
          + '    <button class="btn-secondary small-btn" data-detail-id="' + escapeHtmlAttr(item.id) + '" type="button">Ver detalhes</button>'
          + '    <button class="btn-ghost small-btn" data-copy-id="' + escapeHtmlAttr(item.id) + '" type="button">Copiar texto</button>'
          + '  </div>'
          + '</td>';

        frag.appendChild(tr);
      });

      els.resultsBody.appendChild(frag);

      // Eventos dos inputs de prazo
      els.resultsBody.querySelectorAll("[data-deadline-id]").forEach(function (input) {
        input.addEventListener("change", function (e) {
          var id = e.target.getAttribute("data-deadline-id");
          var value = e.target.value || "";

          if (value) state.deadlines[id] = value;
          else delete state.deadlines[id];

          saveDeadlines();

          state.rawItems = state.rawItems.map(function (i) {
            return i.id === id ? Object.assign({}, i, { prazoFinal: value }) : i;
          });

          applyLocalFiltersAndRender();
          setMessage(value ? ("Prazo salvo para a publicação " + id + ".") : ("Prazo removido da publicação " + id + "."));
        });
      });

      // Botão Ver detalhes
      els.resultsBody.querySelectorAll("[data-detail-id]").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          var id = e.target.getAttribute("data-detail-id");
          var item = state.rawItems.find(function (x) { return x.id === id; });
          if (!item) return;

          state.selectedItem = item;
          renderDetails(item);
        });
      });

      // Copiar texto
      els.resultsBody.querySelectorAll("[data-copy-id]").forEach(function (btn) {
        btn.addEventListener("click", async function (e) {
          var id = e.target.getAttribute("data-copy-id");
          var item = state.rawItems.find(function (x) { return x.id === id; });
          if (!item) return;

          var text = [
            "ID: " + item.id,
            "Data: " + formatDateBR(item.dataPublicacao),
            "Tribunal: " + (item.tribunal || "—"),
            "Processo: " + (item.processo || "—"),
            "Vara: " + (item.vara || "—"),
            "Classe: " + (item.classe || "—"),
            "Tipo de ato: " + (item.tipoAto || "—"),
            "Partes: " + (item.partes || "—"),
            "Advogados: " + (item.advogados || "—"),
            "Prazo final: " + (state.deadlines[item.id] || "—"),
            "Sem efeito de intimação: " + (item.semEfeitoIntimacao ? "Sim" : "Não"),
            "",
            item.textoResumo || item.texto || ""
          ].join("\n");

          try {
            await navigator.clipboard.writeText(text);
            setMessage("Texto da publicação " + id + " copiado.");
          } catch (e2) {
            setMessage("Não foi possível copiar para a área de transferência.");
          }
        });
      });
    }

    function renderDetails(item) {
      if (!item) return;

      var prazo = state.deadlines[item.id] || "—";

      els.detailsModalContent.innerHTML = ''
        + '<div class="kv"><div class="key">ID</div><div class="val mono">' + escapeHtml(item.id) + '</div></div>'
        + '<div class="kv"><div class="key">Data da publicação</div><div class="val">' + escapeHtml(formatDateBR(item.dataPublicacao)) + '</div></div>'
        + '<div class="kv"><div class="key">Tribunal</div><div class="val">' + escapeHtml(item.tribunal || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Processo</div><div class="val mono">' + escapeHtml(item.processo || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Vara / Unidade</div><div class="val">' + escapeHtml(item.vara || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Tipo de ato</div><div class="val">' + escapeHtml(item.tipoAto || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Partes</div><div class="val">' + escapeHtml(item.partes || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Advogados</div><div class="val">' + escapeHtml(item.advogados || "—") + '</div></div>'
        + '<div class="kv"><div class="key">Prazo final</div><div class="val">' + escapeHtml(formatDateBR(prazo)) + '</div></div>'
        + '<div class="kv"><div class="key">Texto</div><div class="val" style="white-space:pre-wrap;">' + escapeHtml(item.textoResumo || item.texto || "—") + '</div></div>'
        + '<div style="margin-top:24px; display:flex; justify-content:flex-end; gap:12px;">'
        + '  <button type="button" id="btnFecharModal" class="btn-secondary">Fechar</button>'
        + '  <button type="button" id="btnCriarPrazoPublicacao" style="background:#1f7a46;color:#fff;border:none;padding:12px 18px;border-radius:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(31,122,70,.25);">Criar Prazo</button>'
        + '</div>';

      openDetailsModal();
    }

    function openDetailsModal() {
      els.detailsModal.classList.add("show");
      els.detailsModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closeDetailsModal() {
      els.detailsModal.classList.remove("show");
      els.detailsModal.setAttribute("aria-hidden", "true");
      els.detailsModalContent.innerHTML = "";
      document.body.classList.remove("modal-open");
    }

    function toggleManualDeadlineForm(show) {
      var wrap = document.getElementById("deadlineManualWrap");
      if (!wrap) return;

      if (show) {
        wrap.classList.add("show");
        // Preenche o prazo inicial com a data da publicação
        var inicialInput = document.getElementById("prazoInicialManual");
        if (state.selectedItem && state.selectedItem.dataPublicacao) {
          inicialInput.value = state.selectedItem.dataPublicacao; // formato YYYY-MM-DD
        }
      } else {
        wrap.classList.remove("show");
      }
    }

    function salvarPrazoManual() {
      if (!state.selectedItem) return;

      var id = state.selectedItem.id;
      var inicial = document.getElementById("prazoInicialManual").value;
      var seguro = document.getElementById("prazoSeguroManual").value;
      var fatal = document.getElementById("prazoFatalManual").value;
      var tarefa = document.getElementById("tarefaPrazoManual").value.trim();

      if (!fatal) {
        alert("O Prazo Fatal é obrigatório.");
        return;
      }

      // Salva o prazo fatal como principal (o front já usa prazoFinal)
      state.deadlines[id] = fatal;

      // Salva detalhes extras (opcional)
      state.deadlines[id + "_detalhes"] = {
        inicial: inicial || state.selectedItem.dataPublicacao,
        seguro: seguro || "",
        fatal: fatal,
        tarefa: tarefa || "Prazo manual para publicação " + id
      };

      saveDeadlines();

      // Atualiza a tabela e o modal
      applyLocalFiltersAndRender();
      renderDetails(state.selectedItem);

      toggleManualDeadlineForm(false);
      setMessage("Prazo manual salvo para publicação " + id + ".");
    }

    function exportJson() {
      var payload = {
        exportedAt: new Date().toISOString(),
        total: state.filteredItems.length,
        itens: state.filteredItems.map(function (item) {
          return {
            id: item.id,
            dataPublicacao: item.dataPublicacao,
            tribunal: item.tribunal,
            processo: item.processo,
            vara: item.vara,
            tipoAto: item.tipoAto,
            partes: item.partes,
            advogados: item.advogados,
            texto: item.textoResumo || item.texto || "",
            prazoFinal: state.deadlines[item.id] || "",
            prazoDetalhes: state.deadlines[item.id + "_detalhes"] || null,
            raw: item._raw || {}
          };
        })
      };

      var blob = new Blob([JSON.stringify(payload, null, 2)], {
        type: "application/json;charset=utf-8"
      });

      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "publicacoes-snap.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setMessage("Exportação concluída.");
    }

    function clearAllDeadlines() {
      if (!confirm("Deseja apagar todos os prazos salvos neste navegador?")) return;
      state.deadlines = {};
      saveDeadlines();
      applyLocalFiltersAndRender();
      if (state.selectedItem) {
        renderDetails(state.selectedItem);
      } else {
        closeDetailsModal();
      }
      setMessage("Todos os prazos foram apagados.");
    }

    function truncate(text, max) {
      var s = String(text || "");
      return s.length > max ? s.slice(0, max).trimEnd() + "…" : s;
    }

    function escapeHtml(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeHtmlAttr(str) {
      return escapeHtml(str).replace(/`/g, "&#96;");
    }
  })();
</script>
